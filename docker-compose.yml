version: "3.9"

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - SOCKS5_ENABLED=on
      - SOCKS5_LISTENING_ADDRESS=:1080
      - HTTPPROXY=on
      - HTTPPROXY_LISTENING_ADDRESS=:8888

  scalper:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-yourorg/scalping-bot}:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SOCKS_PROXY=socks5h://gluetun:1080
      - MAX_PORTFOLIO_PCT=24.0
      - MAX_OPEN_POSITIONS=4
      # ── Testnet overrides — looser filters to compensate for thin testnet market ──
      - MIN_VOLUME_USDT=100000     # testnet has low simulated volume
      - MAX_SYMBOLS=30             # cast wider net
      - ADX_MIN=20                 # testnet trends are weaker
      - RSI_MIN=45                 # wider momentum window
      - RSI_MAX=70
      - MAX_SPREAD_PCT=0.2         # testnet spreads are wider
      - MAX_HOLD_CANDLES=6         # faster cycling for testing
    depends_on:
      - gluetun
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-yourorg/scalping-bot-ui}:${IMAGE_TAG:-local}
    depends_on:
      - scalper
    ports:
      - "${UI_PORT:-8080}:80"
    restart: unless-stopped

  # Watchtower auto-pulls new images deployed by GitHub Actions.
  # Gated behind the "production" profile — not started locally unless explicitly requested.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    profiles: ["production"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
    command: scalper ui