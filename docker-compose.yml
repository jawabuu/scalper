version: "3.9"

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - SOCKS5_PROXY=on
      - SOCKS5_PROXY_LISTENING_ADDRESS=:1080
      - HTTPPROXY=on
      - HTTPPROXY_LISTENING_ADDRESS=:8888

  scalper:
    # Local: builds from source. VPS: pulls pre-built image from GHCR.
    # IMAGE_TAG is set by GitHub Actions; unset locally so the build target is used.
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-yourorg/scalping-bot}:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SOCKS_PROXY=http://gluetun:8888
    depends_on:
      - gluetun
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-yourorg/scalping-bot-ui}:${IMAGE_TAG:-local}
    depends_on:
      - scalper
    ports:
      - "${UI_PORT:-8080}:80"
    restart: unless-stopped

  # Watchtower auto-pulls new images deployed by GitHub Actions.
  # Gated behind the "production" profile — not started locally unless explicitly requested.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    profiles: ["production"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
    command: scalper ui